version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '4'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - qdrant
      - redis
      - ollama
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/data/uploads
      - ./data/reports:/app/data/reports
      - ./data/logs:/app/data/logs
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks.celery_tasks worker --loglevel=info --concurrency=2
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - redis
      - backend
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/data/uploads
      - ./data/reports:/app/data/reports
      - ./data/logs:/app/data/logs
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

volumes:
  qdrant_data:
  ollama_data: